<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link id="overlay-style" rel="stylesheet" href="/overlay/twitch_chat/style.css">
  <style>
    body { 
      background: transparent; 
      overflow: hidden; 
      margin: 0; 
      padding: 0;
      color: #ffffff;
      font-family: 'Rajdhani', sans-serif;
    }
    #chat-container {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: var(--chat-container-width, 400px);
      display: flex;
      flex-direction: var(--chat-stack-direction, column);
      gap: var(--chat-message-gap, 8px);
      pointer-events: none;
      color: inherit;
    }

    .chat-message {
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(var(--chat-blur, 0px));
      -webkit-backdrop-filter: blur(var(--chat-blur, 0px));
      color: #ffffff; /* Explicit safety net */
    }

    .chat-text {
      color: #ffffff; /* Explicit safety net */
    }

    /* ── Animations ────────────────────────────────────────────── */
    
    .anim-slide { animation: chatSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .anim-fade  { animation: chatFadeIn 0.4s ease both; }
    .anim-pop   { animation: chatPopIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .anim-bounce { animation: chatBounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) both; }

    @keyframes chatSlideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes chatFadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes chatPopIn   { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes chatBounceIn {
      0%   { opacity: 0; transform: translateY(40px); }
      60%  { opacity: 1; transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    /* ── Frame Styles ──────────────────────────────────────────── */

    .frame-glass {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2) !important;
    }

    .frame-neon {
      border: 2px solid var(--ht-color-primary, #8b5cf6) !important;
      box-shadow: 0 0 10px var(--ht-color-primary, #8b5cf6), inset 0 0 5px var(--ht-color-primary, #8b5cf6) !important;
      background: rgba(0, 0, 0, 0.8) !important;
    }

    .frame-retro {
      border: 3px double #fff !important;
      background: #000080 !important;
      box-shadow: 4px 4px 0 #000 !important;
      border-radius: 0 !important;
    }

    .chat-badges-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .chat-badge {
      width: 18px;
      height: 18px;
      object-fit: contain;
      border-radius: 2px;
    }

    .chat-badge-text {
      display: inline-block;
      font-size: 0.7em;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      font-weight: 700;
      line-height: 1;
    }

    .badge-broadcaster { color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
    .badge-moderator   { color: #00ff7f; border: 1px solid rgba(0,255,127,0.3); }
    .badge-vip         { color: #ff69b4; border: 1px solid rgba(255,105,180,0.3); }
    .badge-subscriber  { color: #87ceeb; border: 1px solid rgba(135,206,235,0.3); }
  </style>
</head>
<body>
  <div id="chat-container">
    <!-- Messages injected here -->
  </div>

  <script>
    let currentCssVersion = 0;
    const activeMessageIds = new Set();

    async function poll() {
      try {
        const res = await fetch('/twitch/chat');
        if (res.ok) {
          const data = await res.json();
          update(data.messages, data.settings);
        }

        const vRes = await fetch('/overlay/version');
        if (vRes.ok) {
          const vData = await vRes.json();
          if (vData.version > currentCssVersion) {
            const link = document.getElementById('overlay-style');
            link.href = `/overlay/twitch_chat/style.css?v=${vData.version}`;
            currentCssVersion = vData.version;
          }
        }
      } catch(e) {}
    }

    function update(messages, settings) {
      if (!messages) return;
      const maxMsgs = settings?.max_messages || 50;

      const container = document.getElementById('chat-container');
      
      // Update global CSS variables from settings
      if (settings?.chat_background_blur !== undefined) {
        document.documentElement.style.setProperty('--chat-blur', `${settings.chat_background_blur}px`);
      }

      messages.forEach(msg => {
        if (!activeMessageIds.has(msg.id)) {
          spawnMessage(msg, settings);
        }
      });

      while (container.children.length > maxMsgs) {
        const first = container.firstChild;
        activeMessageIds.delete(first.id);
        container.removeChild(first);
      }
    }

    function spawnMessage(msg, settings) {
      const container = document.getElementById('chat-container');
      activeMessageIds.add(msg.id);

      const div = document.createElement('div');
      div.id = msg.id;
      
      let classes = ['chat-message', 'panoptic-overlay-card'];
      
      // Add Animation Class
      const anim = (settings?.chat_animation || 'Slide').toLowerCase();
      classes.push(`anim-${anim}`);

      // Add Frame Class
      const frame = (settings?.chat_frame_style || 'None').toLowerCase();
      if (frame !== 'none') classes.push(`frame-${frame}`);

      if (msg.is_mod) classes.push('chat-message-mod');
      if (msg.is_broadcaster) classes.push('chat-message-broadcaster');
      if (msg.is_vip) classes.push('chat-message-vip');
      if (msg.is_sub) classes.push('chat-message-sub');
      div.className = classes.join(' ');
      
      const showPronouns = settings?.show_pronouns ?? true;
      const showBadges = settings?.show_badges ?? true;
      const template = settings?.message_template || "{pronouns} {user}: {message}";

      const pronounsHtml = (showPronouns && msg.pronouns) 
        ? `<span class="chat-pronouns">[${msg.pronouns}]</span>`
        : '';
      
      const badgesHtml = (showBadges && msg.badges)
        ? `<span class="chat-badges-wrap">${msg.badges.map(b => {
            if (b.image_url) {
                return `<img class="chat-badge" src="${b.image_url}" title="${b.set_id}">`;
            }
            return `<span class="chat-badge-text badge-${b.set_id}">${b.set_id[0].toUpperCase()}</span>`;
          }).join('')}</span>`
        : '';

      const content = template
        .replace('{user}', `<span class="chat-username" style="color: ${msg.color}">${msg.user_name}</span>`)
        .replace('{message}', `<span class="chat-text">${msg.message}</span>`)
        .replace('{pronouns}', pronounsHtml)
        .replace('{badges}', badgesHtml)
        .replace('{color}', msg.color);

      div.innerHTML = content;
      container.appendChild(div);
    }

    setInterval(poll, 1000);
    poll();
  </script>
</body>
</html>
