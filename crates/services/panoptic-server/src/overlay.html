<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Panoptic Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link id="overlay-style" rel="stylesheet" href="/overlay/now_playing/style.css">

  <style>
    /* Default fallback and overlay settings */
    body {
      background-color: transparent;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* Thematic Filtering default animations */
    @keyframes thematic-flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    body.effect-flash {
      animation: thematic-flash 0.5s ease infinite-alternate;
    }
    body.effect-color-shift {
      filter: hue-rotate(90deg);
      transition: filter 0.8s ease;
    }
    @keyframes thematic-glow {
      0%, 100% { filter: drop-shadow(0 0 2px #ff007f) drop-shadow(0 0 4px #ff007f); }
      50% { filter: drop-shadow(0 0 10px #ff007f) drop-shadow(0 0 20px #ff007f); }
    }
    @keyframes thematic-glitch {
      0% { transform: translate(0) skew(0deg); }
      10% { transform: translate(-2px, 1px) skew(-1deg); }
      20% { transform: translate(1px, -1px) skew(2deg); filter: hue-rotate(90deg); }
      30% { transform: translate(-1px, 2px) skew(0deg); }
      40% { transform: translate(2px, -2px) skew(-2deg); filter: hue-rotate(180deg); }
      50% { transform: translate(0) skew(0deg); }
    }
    body.effect-glow {
      animation: thematic-glow 1s ease infinite alternate;
    }
    body.effect-glitch {
      animation: thematic-glitch 0.3s steps(2) infinite;
    }
    body.effect-chaos {
      animation: thematic-glow 1s ease infinite alternate, thematic-glitch 0.3s steps(2) infinite;
    }
  </style>
</head>
<body>
  <div class="panoptic-overlay-wrapper" data-playing="false">
    <div class="panoptic-overlay-card">
      <div class="panoptic-overlay-art-container">
        <img src="" alt="Album Art" class="panoptic-overlay-album-art" style="display: none;">
      </div>
      <div class="panoptic-overlay-text-container">
        <div class="panoptic-overlay-track-title">Not Playing</div>
        <div class="panoptic-overlay-track-artist">Unknown Artist</div>
        <div class="panoptic-overlay-track-album">Unknown Album</div>
        <div class="panoptic-overlay-progress-section">
          <div class="panoptic-overlay-progress-container">
            <div class="panoptic-overlay-progress-bar" style="width: 0%;"></div>
          </div>
          <div class="panoptic-overlay-time-display">
            <span class="panoptic-overlay-time-current">0:00</span>
            <span class="panoptic-overlay-time-separator">/</span>
            <span class="panoptic-overlay-time-duration">0:00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isPlaying = false;
    let durationMs = 0;
    let currentCssVersion = 0;
    let prevPlayback = null;
    let baseProgressMs = 0;
    let baseTime = Date.now();

    function formatTime(ms) {
      if (!ms || isNaN(ms) || ms < 0) return '0:00';
      const totSecs = Math.floor(ms / 1000);
      const h = Math.floor(totSecs / 3600);
      const m = Math.floor((totSecs % 3600) / 60);
      const s = totSecs % 60;
      const pad = (n) => n.toString().padStart(2, '0');
      if (h > 0) {
        return `${h}:${pad(m)}:${pad(s)}`;
      }
      return `${m}:${pad(s)}`;
    }

    function updateDOM(state) {
      const wrapper = document.querySelector('.panoptic-overlay-wrapper');
      const art = document.querySelector('.panoptic-overlay-album-art');
      const title = document.querySelector('.panoptic-overlay-track-title');
      const artist = document.querySelector('.panoptic-overlay-track-artist');
      const album = document.querySelector('.panoptic-overlay-track-album');
      const duration = document.querySelector('.panoptic-overlay-time-duration');

      const settings = window.PanopticSettings || {};

      if (!state || !state.title) {
        wrapper.setAttribute('data-playing', 'false');
        title.textContent = settings.not_playing_title || 'Not Playing';
        artist.textContent = settings.not_playing_artist || 'Unknown Artist';
        album.textContent = settings.not_playing_album || 'Unknown Album';
        duration.textContent = '0:00';
        art.style.display = 'none';
        isPlaying = false;
        durationMs = 0;
        prevPlayback = null;
        baseProgressMs = 0;
        baseTime = Date.now();
        updateProgressDOM();
        return;
      }

      wrapper.setAttribute('data-playing', state.is_playing ? 'true' : 'false');
      
      if (state.art_source) {
        const artKey = state.art_source + '|' + state.title + '|' + state.artist;
        if (art.dataset.artKey !== artKey) {
          art.dataset.artKey = artKey;
          if (state.art_source.startsWith('http://') || state.art_source.startsWith('https://') || state.art_source.startsWith('data:')) {
            art.src = state.art_source;
          } else {
            art.src = '/art?v=' + encodeURIComponent(state.art_source) + '&t=' + Date.now();
          }
        }
        art.style.display = 'block';
      } else {
        art.dataset.artKey = '';
        art.style.display = 'none';
      }

      title.textContent = state.title;
      artist.textContent = state.artist || 'Unknown Artist';
      album.textContent = state.album || 'Unknown Album';
      duration.textContent = formatTime(state.duration_ms);

      const now = Date.now();
      const prev = prevPlayback;
      const isTrackChanged = !prev || prev.title !== state.title || prev.artist !== state.artist;
      const wasNotPlaying = !prev || !prev.is_playing;

      // Detect a seek: server position deviates > 3 s from where interpolation expects
      const elapsed = now - baseTime;
      const expectedProgress = baseProgressMs + (prev && prev.is_playing ? elapsed : 0);
      const isSeeked = !isTrackChanged && Math.abs(state.progress_ms - expectedProgress) > 3000;

      if (isTrackChanged || wasNotPlaying || isSeeked) {
        baseProgressMs = state.progress_ms;
        baseTime = now;
      }

      isPlaying = state.is_playing;
      durationMs = state.duration_ms;
      prevPlayback = state;

      updateProgressDOM();
    }

    function updateProgressDOM() {
      let currentProgress = baseProgressMs;
      if (isPlaying) {
        const elapsed = Date.now() - baseTime;
        currentProgress = Math.min(baseProgressMs + elapsed, durationMs);
      }

      const percent = durationMs > 0 ? (currentProgress / durationMs) * 100 : 0;
      
      const bar = document.querySelector('.panoptic-overlay-progress-bar');
      const current = document.querySelector('.panoptic-overlay-time-current');

      if (bar) bar.style.width = percent + '%';
      if (current) current.textContent = formatTime(currentProgress);
    }

    async function poll() {
      try {
        const response = await fetch('/playback');
        if (response.ok) {
          const state = await response.json();
          updateDOM(state);
        }

        const vRes = await fetch('/overlay/version');
        if (vRes.ok) {
          const vData = await vRes.json();
          if (vData.version > currentCssVersion) {
            console.log('CSS updated, reloading...');
            const link = document.getElementById('overlay-style');
            link.href = `/overlay/now_playing/style.css?v=${vData.version}`;
            currentCssVersion = vData.version;
          }
        }

        const eRes = await fetch('/overlay/effects');
        if (eRes.ok) {
          const activeEffects = await eRes.json();
          document.body.className = document.body.className.split(' ').filter(c => !c.startsWith('effect-')).join(' ');
          activeEffects.forEach(effect => {
            document.body.classList.add(`effect-${effect}`);
          });
        }
      } catch (err) {
        console.error('Error fetching state:', err);
      }
    }

    // Poll every second
    setInterval(poll, 1000);
    poll();

    // Interpolate progress bar for smooth animation (~30fps)
    setInterval(updateProgressDOM, 33);
  </script>
</body>
</html>
