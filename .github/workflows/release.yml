name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Pin Node and Rust versions for reproducibility
  NODE_VERSION: "22"
  RUST_VERSION: "stable"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Toolchain setup ──────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Platform-specific system deps ────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      # ── Caching ──────────────────────────────────────────────────────
      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: crates/ui/panoptic-gui/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('crates/ui/panoptic-gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ── Frontend build ───────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: crates/ui/panoptic-gui
        run: npm ci

      # ── Tauri build ──────────────────────────────────────────────────
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/ui/panoptic-gui
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name || github.event.inputs.tag }}
          releaseName: "Panoptic ${{ github.ref_name || github.event.inputs.tag }}"
          releaseBody: |
            See the [changelog](https://github.com/${{ github.repository }}/blob/main/change-log.md) for details.
          releaseDraft: true
          prerelease: false
